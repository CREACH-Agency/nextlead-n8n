# Publishes n8n-nodes-nextlead to npm on every version tag push.
#
# From May 1st 2026, n8n requires all community nodes submitted for verification
# to be published via GitHub Actions with an npm provenance statement.
# This workflow satisfies that requirement.
#
# ─── ONE-TIME SETUP ────────────────────────────────────────────────────────────
#
# Option A — OIDC Trusted Publishing (recommended, no long-lived secrets):
#   1. Log in to npmjs.com and open the n8n-nodes-nextlead package settings.
#   2. Under "Publish access" → "Trusted Publishers", click "Add a publisher".
#   3. Select GitHub Actions and fill in:
#        Repository owner: CREACH-Agency
#        Repository name:  nextlead-n8n
#        Workflow name:    publish.yml
#        Environment:      (leave blank)
#   4. Do NOT set NPM_TOKEN — GitHub OIDC token is used instead.
#
# Option B — npm Automation Token (fallback):
#   1. npmjs.com → Access Tokens → Generate New Token → Granular Access Token.
#      Scope to n8n-nodes-nextlead with "Read and write" permission.
#   2. GitHub → Settings → Secrets and variables → Actions → New repository secret.
#      Name: NPM_TOKEN, Value: the token.
#
# ─── RELEASE PROCESS ───────────────────────────────────────────────────────────
#
# Run locally to trigger a release:
#
#   pnpm run release
#
# This lints, builds, prompts for version bump, commits, tags, and pushes.
# The tag push triggers this workflow which publishes to npm with provenance.

name: Publish

on:
  push:
    tags:
      - '*.*.*'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Publish to npm
        run: |
          [ -n "$NPM_TOKEN" ] && npm config set //registry.npmjs.org/:_authToken "$NPM_TOKEN"
          pnpm run build
          npm publish --provenance --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
